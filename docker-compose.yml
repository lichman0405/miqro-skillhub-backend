# SkillHub — local development Compose stack.
#
# Services:
#   postgres   PostgreSQL 16 (skillhub database)
#   redis      Redis 7 (reserved for future adapters; not currently consumed)
#   minio      MinIO S3-compatible object storage
#   server     SkillHub Go API server (full backend API; optional full profile)
#
# Storage: the full server profile uses S3/MinIO object storage by default.
# For local development without MinIO, use SKILLHUB_STORAGE_PROVIDER=local.
#
# Redis: started for future adapters or optional local infrastructure.
# The server currently does NOT use Redis for sessions or rate limiting.
#
# Usage:
#   docker compose up -d postgres redis minio
#   docker compose --profile full up -d

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillhub-postgres
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
      POSTGRES_DB: skillhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis is reserved for future adapters (distributed sessions, rate limiting).
  # The server currently does not consume Redis at runtime.
  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: skillhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillhub-server
    environment:
      SKILLHUB_API_ADDR: ":8080"
      SKILLHUB_DATABASE_URL: "postgres://skillhub:skillhub@postgres:5432/skillhub?sslmode=disable"
      SKILLHUB_REDIS_URL: "redis://redis:6379/0"
      SKILLHUB_STORAGE_PROVIDER: "s3"
      SKILLHUB_STORAGE_ENDPOINT: "minio:9000"
      SKILLHUB_STORAGE_BUCKET: "skillhub"
      SKILLHUB_STORAGE_ACCESS_KEY: "minioadmin"
      SKILLHUB_STORAGE_SECRET_KEY: "minioadmin"
      SKILLHUB_STORAGE_USE_SSL: "false"
      SKILLHUB_LOCAL_MODE: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - full

volumes:
  pgdata:
  miniodata:

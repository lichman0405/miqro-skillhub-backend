# SkillHub — local development Compose stack.
#
# This is a LOCAL DEVELOPMENT compose. It uses SKILLHUB_LOCAL_MODE=true
# and minioadmin credentials on purpose — they are acceptable for a dev
# machine but must never reach production.
#
# Services:
#   postgres     PostgreSQL 16 (skillhub database)
#   redis        Redis 7 (distributed sessions and rate limiting for full profile)
#   minio        MinIO S3-compatible object storage
#   minio-init   Creates the "skillhub" bucket in MinIO (full profile)
#   server       SkillHub Go API server (full backend API; full profile)
#
# Storage: the full server profile uses S3/MinIO object storage by default.
# The minio-init service automatically creates the "skillhub" bucket before
# the server starts. For local development without MinIO, use
# SKILLHUB_STORAGE_PROVIDER=local.
#
# Redis: used for sessions and distributed rate limiting when the
# full profile is active. The server uses Redis-backed sessions
# (SKILLHUB_SESSION_BACKEND=redis) and Redis-backed rate limiting
# (SKILLHUB_RATE_LIMIT_BACKEND=redis) in the full profile.
#
# Usage:
#   docker compose up -d postgres redis minio
#   docker compose --profile full up -d

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillhub-postgres
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
      POSTGRES_DB: skillhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for distributed sessions and rate limiting.
  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: skillhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot init container: creates the "skillhub" bucket so the S3 adapter
  # can verify bucket existence on startup.
  minio-init:
    image: minio/mc:latest
    container_name: skillhub-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/skillhub"]
    profiles:
      - full

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillhub-server
    environment:
      SKILLHUB_API_ADDR: ":8080"
      SKILLHUB_DATABASE_URL: "postgres://skillhub:skillhub@postgres:5432/skillhub?sslmode=disable"
      SKILLHUB_REDIS_URL: "redis://redis:6379/0"
      SKILLHUB_STORAGE_PROVIDER: "s3"
      SKILLHUB_STORAGE_ENDPOINT: "minio:9000"
      SKILLHUB_STORAGE_BUCKET: "skillhub"
      SKILLHUB_STORAGE_ACCESS_KEY: "minioadmin"
      SKILLHUB_STORAGE_SECRET_KEY: "minioadmin"
      SKILLHUB_STORAGE_USE_SSL: "false"
      # Local-mode true so dev compose does not reject minioadmin credentials.
      SKILLHUB_LOCAL_MODE: "true"
      # Redis-backed sessions and distributed rate limiting.
      SKILLHUB_SESSION_BACKEND: "redis"
      SKILLHUB_SESSION_COOKIE_SECURE: "false"
      SKILLHUB_SESSION_TTL: "24h"
      SKILLHUB_RATE_LIMIT_BACKEND: "redis"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    profiles:
      - full

volumes:
  pgdata:
  miniodata:

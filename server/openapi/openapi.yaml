        - { name: runID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Check run list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckRun"

  /api/v1/skills/{skillID}/ci/checks/{checkID}:
    get:
      tags: [AgentCI]
      summary: Get a single check run by ID
      parameters:
        - { name: skillID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: checkID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Check run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckRun"

  /api/v1/skills/{skillID}/ci/checks/{checkID}/artifacts:
    get:
      tags: [AgentCI]
      summary: List artifacts for a check run
      parameters:
        - { name: skillID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: checkID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Artifact list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckArtifact"

  /api/v1/skills/{skillID}/ci/gates:
    get:
      tags: [AgentCI]
      summary: Evaluate CI gates for a skill
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - { name: skillID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: trigger, in: query, schema: { type: string } }
        - { name: versionId, in: query, schema: { type: integer, format: int64 } }
        - { name: releaseId, in: query, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Gate evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateEvalResult"

  # ── Release publish with gates ─────────────────────────────────────────

  /api/v1/skills/{namespace}/{slug}/releases/{releaseID}/publish:
    post:
      tags: [Release]
      summary: Publish a draft release (with gate enforcement)
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: releaseID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Published release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
        "409":
          description: Gate enforcement failed

  /api/v1/skills/{namespace}/{slug}/community/search:
    get:
      tags: [Community]
      summary: Search community objects for a skill
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: query, in: query, schema: { type: string } }
        - { name: types, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: size, in: query, schema: { type: integer } }
      responses:
        "200": { description: Search results }


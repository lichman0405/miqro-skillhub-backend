openapi: "3.0.3"
info:
  title: SkillHub API
  description: |
    SkillHub backend HTTP API.  Covers native portal routes (/api/v1/),
    web aliases (/api/web/), CLI routes (/api/cli/v1/), tool-facing
    routes for the miqro CLI (/api/tool/v1/), ClawHub compatibility,
    well-known discovery endpoints, and frontend page-oriented read
    models (/api/v1/frontend/*).
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  # --- Health ---
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Server is alive
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Server is ready
        "503":
          description: Server is not ready

  # --- Auth ---
  /api/v1/auth/login:
    post:
      summary: Local username/password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Login successful; returns user principal
        "401":
          description: Invalid credentials

  /api/v1/auth/register:
    post:
      summary: Register a new local user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
                displayName: { type: string }
                email: { type: string }
      responses:
        "201":
          description: User registered
        "409":
          description: Username or email already taken

  /api/v1/auth/me:
    get:
      summary: Returns the authenticated caller's identity
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        "200":
          description: Current user principal
        "401":
          description: Not authenticated

  /api/v1/search:
    get:
      summary: Search skills (GET — query params)
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string, enum: [relevance, downloads, rating, newest] }
        - name: installableOnly
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: SearchResult with skill IDs and total count

  /api/v1/skills/{namespace}/{slug}:
    get:
      summary: Get skill detail
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: SkillDetail

  /api/v1/skills/{namespace}/{slug}/download:
    get:
      summary: Download latest published version
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Zip archive of the skill package

  /api/v1/namespaces/{slug}:
    get:
      summary: Get namespace by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Namespace detail

  # --- CLI ---
  /api/cli/v1/auth/whoami:
    get:
      summary: CLI whoami — returns authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: CLI-compatible user principal

  /api/cli/v1/skills/search:
    get:
      summary: CLI search with installability filter
      parameters:
        - name: q
          in: query
          schema: { type: string }
      responses:
        "200":
          description: SearchResult

  # --- Tool API (miqro CLI protocol surface) ---

  /api/tool/v1/workspace/metadata:
    get:
      summary: Returns the miqro init workspace contract
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        "200":
          description: Workspace metadata contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMetadataResponse"

  /api/tool/v1/packages/hash:
    post:
      summary: Compute deterministic package manifest hash from entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageHashRequest"
      responses:
        "200":
          description: Package manifest with hash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageHashResponse"

  /api/tool/v1/skills/{namespace}/{slug}/resolve:
    get:
      summary: Resolve a skill version with tooling fingerprint and download URL
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Resolved version with fingerprint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveResult"

  /api/tool/v1/skills/{namespace}/{slug}/install:
    get:
      summary: Return install-target metadata for a skill version
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Install target metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallTarget"

  /api/tool/v1/skills/{namespace}/{slug}/diff:
    get:
      summary: Diff two versions of a skill package
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: from
          in: query
          required: true
          schema: { type: string }
        - name: to
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Version diff with file-level changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionDiff"

  /api/tool/v1/skills/{namespace}/validate:
    post:
      summary: Tool-facing dry-run validation of a skill package
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [package]
              properties:
                package:
                  type: string
                  format: binary
                  description: ZIP archive of the skill package
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolValidateResponse"

  /api/tool/v1/skills/{namespace}/publish:
    post:
      summary: Tool-facing skill package publish
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [package]
              properties:
                package:
                  type: string
                  format: binary
                  description: ZIP archive of the skill package
      responses:
        "201":
          description: Published skill version info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolPublishResponse"

  /api/tool/v1/evaluate/trigger:
    post:
      summary: Trigger skill evaluation (Phase 12 placeholder)
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
      responses:
        "200":
          description: Evaluation trigger result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"

  /api/tool/v1/proposals/prepare:
    post:
      summary: Prepare a Skill Change Proposal (Phase 11 placeholder)
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalRequest"
      responses:
        "200":
          description: Proposal preparation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalResponse"

  # --- Well-known ---
  /.well-known/skillhub:
    get:
      summary: SkillHub registry discovery
      responses:
        "200":
          description: Registry metadata

  /.well-known/clawhub:
    get:
      summary: ClawHub compatibility discovery
      responses:
        "200":
          description: ClawHub compatibility metadata

  # ── Frontend page read-models ───────────────────────────────────────

  /api/v1/frontend/search:
    get:
      summary: Skill registry search/home read model
      description: Returns viewer-scoped search results and availableActions computed from auth principal.
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Free-text search query. Alias of keyword.
        - name: keyword
          in: query
          schema: { type: string }
          description: Free-text search query.
        - name: page
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: size
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: sort
          in: query
          schema: { type: string, enum: [relevance, downloads, rating, newest], default: relevance }
          description: Sort field. Alias of sortBy.
        - name: sortBy
          in: query
          schema: { type: string, enum: [relevance, downloads, rating, newest], default: relevance }
        - name: labels
          in: query
          schema: { type: string }
          description: Comma-separated label slugs.
        - name: installable
          in: query
          schema: { type: boolean, default: false }
          description: Require the latest version to be installable.
      responses:
        "200":
          description: Registry search page data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrySearchReadModel"

  /api/v1/frontend/skills/{namespace}/{slug}:
    get:
      summary: Skill detail page read model
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Skill detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailReadModel"

  /api/v1/frontend/skills/{namespace}/{slug}/versions/{version}:
    get:
      summary: Version detail/compare read model
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Version detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionDetailReadModel"

  /api/v1/frontend/skills/{namespace}/publish/validate:
    get:
      summary: Publish validate page read model
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Publish validation with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishValidateReadModel"

  /api/v1/frontend/namespaces:
    get:
      summary: Namespace listing read model
      responses:
        "200":
          description: Namespace list with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceListReadModel"

  /api/v1/frontend/namespaces/{slug}:
    get:
      summary: Namespace detail page read model
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Namespace detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceDetailReadModel"

  /api/v1/frontend/reviews:
    get:
      summary: Review queue page read model
      responses:
        "200":
          description: Review queue with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueReadModel"

  /api/v1/frontend/reviews/{id}:
    get:
      summary: Review detail page read model
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Review detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDetailReadModel"

  /api/v1/frontend/promotions:
    get:
      summary: Promotion queue page read model
      responses:
        "200":
          description: Promotion queue with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionQueueReadModel"

  /api/v1/frontend/promotions/{id}:
    get:
      summary: Promotion detail page read model
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Promotion detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionDetailReadModel"

  /api/v1/frontend/governance:
    get:
      summary: Governance workbench read model
      responses:
        "200":
          description: Governance dashboard with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceWorkbenchReadModel"

  /api/v1/frontend/admin:
    get:
      summary: Admin page read model
      responses:
        "200":
          description: Admin dashboard with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPageReadModel"

  # ── Release routes ─────────────────────────────────────────────────────

  /api/v1/skills/{namespace}/{slug}/releases:
    get:
      summary: List releases for a skill
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
        - name: size
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Paginated list of releases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseListResult"
    post:
      summary: Create a new release
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReleaseRequest"
      responses:
        "201":
          description: Created release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"

  /api/v1/skills/{namespace}/{slug}/releases/latest:
    get:
      summary: Get latest stable release for a skill
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: channel
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Latest stable release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"

  /api/v1/skills/{namespace}/{slug}/releases/{releaseID}:
    get:
      summary: Get a single release by ID
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: releaseID
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Release with assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseDetailResponse"
    patch:
      summary: Update release metadata
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: releaseID
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReleaseRequest"
      responses:
        "200":
          description: Updated release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
    delete:
      summary: Delete a release
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: releaseID
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Release deleted

  # ── Frontend release read models ────────────────────────────────────────

  /api/v1/frontend/skills/{namespace}/{slug}/releases:
    get:
      summary: Release list page read model
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Release list with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseListReadModel"

  /api/v1/frontend/skills/{namespace}/{slug}/releases/{releaseID}:
    get:
      summary: Release detail page read model
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: releaseID
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Release detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseDetailReadModel"

  # ── Community: Issues ───────────────────────────────────────────────
  /api/v1/skills/{namespace}/{slug}/issues:
    get:
      tags: [Community]
      summary: List issues for a skill
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200": { description: Issue list }
    post:
      tags: [Community]
      summary: Create a new issue
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
      responses:
        "201": { description: Created issue }

  /api/v1/skills/{namespace}/{slug}/issues/{issueID}:
    get:
      tags: [Community]
      summary: Get an issue with comments and labels
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: issueID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: Issue detail }
    patch:
      tags: [Community]
      summary: Update an issue
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: issueID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueRequest"
      responses:
        "200": { description: Updated issue }
    delete:
      tags: [Community]
      summary: Delete an issue
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: issueID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: Deleted }

  /api/v1/skills/{namespace}/{slug}/issues/{issueID}/comments:
    get:
      tags: [Community]
      summary: List issue comments
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: issueID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: Comment list }
    post:
      tags: [Community]
      summary: Add a comment to an issue
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: issueID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { body: { type: string } }, required: [body] }
      responses:
        "201": { description: Created comment }

  # ── Community: Discussions ──────────────────────────────────────────
  /api/v1/skills/{namespace}/{slug}/discussions:
    get:
      tags: [Community]
      summary: List discussions for a skill
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: category, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200": { description: Discussion list }
    post:
      tags: [Community]
      summary: Create a new discussion
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { title: { type: string }, body: { type: string }, category: { type: string } }, required: [title] }
      responses:
        "201": { description: Created discussion }

  /api/v1/skills/{namespace}/{slug}/discussions/{discussionID}:
    get:
      tags: [Community]
      summary: Get a discussion with comments
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: discussionID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: Discussion detail }
    patch:
      tags: [Community]
      summary: Update a discussion
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: namespace, in: path, required: true, schema: { type: string } }
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: discussionID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { title: { type: string }, body: { type: string }, category: { type: string }, locked: { type: boolean }, pinned: { type: boolean } } }
      responses:

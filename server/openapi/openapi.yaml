        - { name: page, in: query, schema: { type: integer } }
        - { name: size, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Paginated pipeline run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunListResult"

  /api/v1/skills/{skillID}/ci/runs/{runID}:
    get:
      tags: [AgentCI]
      summary: Get a single pipeline run by ID
      parameters:
        - { name: skillID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: runID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Pipeline run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  /api/v1/skills/{skillID}/ci/runs/{runID}/checks:
    get:
      tags: [AgentCI]
      summary: List check runs for a pipeline run

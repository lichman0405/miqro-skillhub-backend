openapi: "3.0.3"
info:
  title: SkillHub API
  description: |
    SkillHub backend HTTP API.  Covers native portal routes (/api/v1/),
    web aliases (/api/web/), CLI routes (/api/cli/v1/), tool-facing
    routes for the miqro CLI (/api/tool/v1/), ClawHub compatibility,
    well-known discovery endpoints, and frontend page-oriented read
    models (/api/v1/frontend/*).
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  # --- Health ---
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Server is alive
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Server is ready
        "503":
          description: Server is not ready

  # --- Auth ---
  /api/v1/auth/login:
    post:
      summary: Local username/password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Login successful; returns user principal
        "401":
          description: Invalid credentials

  /api/v1/auth/register:
    post:
      summary: Register a new local user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
                displayName: { type: string }
                email: { type: string }
      responses:
        "201":
          description: User registered
        "409":
          description: Username or email already taken

  /api/v1/auth/me:
    get:
      summary: Returns the authenticated caller's identity
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        "200":
          description: Current user principal
        "401":
          description: Not authenticated

  /api/v1/search:
    get:
      summary: Search skills (GET — query params)
      parameters:
        - name: keyword
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string, enum: [relevance, downloads, rating, newest] }
        - name: installableOnly
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: SearchResult with skill IDs and total count

  /api/v1/skills/{namespace}/{slug}:
    get:
      summary: Get skill detail
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: SkillDetail

  /api/v1/skills/{namespace}/{slug}/download:
    get:
      summary: Download latest published version
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Zip archive of the skill package

  /api/v1/namespaces/{slug}:
    get:
      summary: Get namespace by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Namespace detail

  # --- CLI ---
  /api/cli/v1/auth/whoami:
    get:
      summary: CLI whoami — returns authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: CLI-compatible user principal

  /api/cli/v1/skills/search:
    get:
      summary: CLI search with installability filter
      parameters:
        - name: q
          in: query
          schema: { type: string }
      responses:
        "200":
          description: SearchResult

  # --- Tool API (miqro CLI protocol surface) ---

  /api/tool/v1/workspace/metadata:
    get:
      summary: Returns the miqro init workspace contract
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        "200":
          description: Workspace metadata contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMetadataResponse"

  /api/tool/v1/packages/hash:
    post:
      summary: Compute deterministic package manifest hash from entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageHashRequest"
      responses:
        "200":
          description: Package manifest with hash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageHashResponse"

  /api/tool/v1/skills/{namespace}/{slug}/resolve:
    get:
      summary: Resolve a skill version with tooling fingerprint and download URL
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Resolved version with fingerprint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveResult"

  /api/tool/v1/skills/{namespace}/{slug}/install:
    get:
      summary: Return install-target metadata for a skill version
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Install target metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallTarget"

  /api/tool/v1/skills/{namespace}/{slug}/diff:
    get:
      summary: Diff two versions of a skill package
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: from
          in: query
          required: true
          schema: { type: string }
        - name: to
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Version diff with file-level changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionDiff"

  /api/tool/v1/skills/{namespace}/validate:
    post:
      summary: Tool-facing dry-run validation of a skill package
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [package]
              properties:
                package:
                  type: string
                  format: binary
                  description: ZIP archive of the skill package
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolValidateResponse"

  /api/tool/v1/skills/{namespace}/publish:
    post:
      summary: Tool-facing skill package publish
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [package]
              properties:
                package:
                  type: string
                  format: binary
                  description: ZIP archive of the skill package
      responses:
        "201":
          description: Published skill version info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolPublishResponse"

  /api/tool/v1/evaluate/trigger:
    post:
      summary: Trigger skill evaluation (Phase 12 placeholder)
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
      responses:
        "200":
          description: Evaluation trigger result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"

  /api/tool/v1/proposals/prepare:
    post:
      summary: Prepare a Skill Change Proposal (Phase 11 placeholder)
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalRequest"
      responses:
        "200":
          description: Proposal preparation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalResponse"

  # --- Well-known ---
  /.well-known/skillhub:
    get:
      summary: SkillHub registry discovery
      responses:
        "200":
          description: Registry metadata

  /.well-known/clawhub:
    get:
      summary: ClawHub compatibility discovery
      responses:
        "200":
          description: ClawHub compatibility metadata

  # ── Frontend page read-models ───────────────────────────────────────

  /api/v1/frontend/search:
    get:
      summary: Skill registry search/home read model
      description: Returns viewer-scoped availableActions computed from auth principal.
      responses:
        "200":
          description: Registry search page data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrySearchReadModel"

  /api/v1/frontend/skills/{namespace}/{slug}:
    get:
      summary: Skill detail page read model
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Skill detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailReadModel"

  /api/v1/frontend/skills/{namespace}/{slug}/versions/{version}:
    get:
      summary: Version detail/compare read model
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Version detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionDetailReadModel"

  /api/v1/frontend/skills/{namespace}/publish/validate:
    get:
      summary: Publish validate page read model
      parameters:
        - name: namespace
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Publish validation with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishValidateReadModel"

  /api/v1/frontend/namespaces:
    get:
      summary: Namespace listing read model
      responses:
        "200":
          description: Namespace list with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceListReadModel"

  /api/v1/frontend/namespaces/{slug}:
    get:
      summary: Namespace detail page read model
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Namespace detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceDetailReadModel"

  /api/v1/frontend/reviews:
    get:
      summary: Review queue page read model
      responses:
        "200":
          description: Review queue with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueReadModel"

  /api/v1/frontend/reviews/{id}:
    get:
      summary: Review detail page read model
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Review detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDetailReadModel"

  /api/v1/frontend/promotions:
    get:
      summary: Promotion queue page read model
      responses:
        "200":
          description: Promotion queue with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionQueueReadModel"

  /api/v1/frontend/promotions/{id}:
    get:
      summary: Promotion detail page read model
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Promotion detail with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionDetailReadModel"

  /api/v1/frontend/governance:
    get:
      summary: Governance workbench read model
      responses:
        "200":
          description: Governance dashboard with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceWorkbenchReadModel"

  /api/v1/frontend/admin:
    get:
      summary: Admin page read model
      responses:
        "200":
          description: Admin dashboard with viewer-scoped availableActions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPageReadModel"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API token (format: sk_...)"
    sessionCookie:
      type: apiKey
      in: cookie
      name: skillhub_session

  schemas:
    # ── Frontend read models ─────────────────────────────────────────

    RegistrySearchReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            searchResult:
              $ref: "#/components/schemas/SearchResult"
            featuredLabels:
              type: array
              items: { type: string }
            availableActions:
              $ref: "#/components/schemas/RegistrySearchActions"

    RegistrySearchActions:
      type: object
      properties:
        canCreateSkill: { type: boolean }
        canCreateNamespace: { type: boolean }
        canAccessAdmin: { type: boolean }

    SkillDetailReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            skill:
              $ref: "#/components/schemas/SkillDetail"
            versions:
              type: array
              items:
                $ref: "#/components/schemas/VersionDetail"
            files:
              type: array
              items:
                $ref: "#/components/schemas/SkillFile"
            availableActions:
              $ref: "#/components/schemas/SkillDetailActions"

    SkillDetailActions:
      type: object
      properties:
        canEdit: { type: boolean }
        canPublish: { type: boolean }
        canDelete: { type: boolean }
        canSubmitForReview: { type: boolean }
        canRequestPromotion: { type: boolean }
        canStar: { type: boolean }
        canReport: { type: boolean }
        canManage: { type: boolean }

    VersionDetailReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            version:
              $ref: "#/components/schemas/VersionDetail"
            availableActions:
              $ref: "#/components/schemas/VersionActions"

    VersionActions:
      type: object
      properties:
        canCompare: { type: boolean }
        canDownload: { type: boolean }
        canSubmitForReview: { type: boolean }
        canRequestPromotion: { type: boolean }
        canYank: { type: boolean }
        canReview: { type: boolean }

    PublishValidateReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            valid: { type: boolean }
            warnings:
              type: array
              items: { type: string }
            errors:
              type: array
              items: { type: string }
            metadata: { type: object }
            availableActions:
              $ref: "#/components/schemas/PublishValidateActions"

    PublishValidateActions:
      type: object
      properties:
        canPublish: { type: boolean }
        canOverrideWarnings: { type: boolean }

    NamespaceListReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            namespaces:
              type: array
              items:
                $ref: "#/components/schemas/Namespace"
            availableActions:
              $ref: "#/components/schemas/NamespaceListActions"

    NamespaceListActions:
      type: object
      properties:
        canCreateNamespace: { type: boolean }

    NamespaceDetailReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            namespace:
              $ref: "#/components/schemas/Namespace"
            members:
              type: array
              items:
                $ref: "#/components/schemas/NamespaceMember"
            availableActions:
              $ref: "#/components/schemas/NamespaceDetailActions"

    NamespaceDetailActions:
      type: object
      properties:
        canEdit: { type: boolean }
        canDelete: { type: boolean }
        canManageMembers: { type: boolean }
        canTransferOwner: { type: boolean }
        canLeave: { type: boolean }
        canJoin: { type: boolean }

    ReviewQueueReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            tasks:
              type: array
              items:
                $ref: "#/components/schemas/ReviewTaskView"
            pendingCount: { type: integer, format: int64 }
            availableActions:
              $ref: "#/components/schemas/ReviewQueueActions"

    ReviewTaskView:
      type: object
      properties:
        id: { type: integer, format: int64 }
        skillVersionId: { type: integer, format: int64 }
        namespaceId: { type: integer, format: int64 }
        submittedBy: { type: string }
        status: { type: string }
        submittedAt: { type: string }

    ReviewQueueActions:
      type: object
      properties:
        canReview: { type: boolean }
        canSubmit: { type: boolean }
        canWithdraw: { type: boolean }

    ReviewDetailReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            task:
              $ref: "#/components/schemas/ReviewTaskView"
            skillName: { type: string }
            version: { type: string }
            availableActions:
              $ref: "#/components/schemas/ReviewDetailActions"

    ReviewDetailActions:
      type: object
      properties:
        canApprove: { type: boolean }
        canReject: { type: boolean }
        canWithdraw: { type: boolean }

    PromotionQueueReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            requests:
              type: array
              items:
                $ref: "#/components/schemas/PromotionRequestView"
            pendingCount: { type: integer, format: int64 }
            availableActions:
              $ref: "#/components/schemas/PromotionQueueActions"

    PromotionRequestView:
      type: object
      properties:
        id: { type: integer, format: int64 }
        sourceSkillId: { type: integer, format: int64 }
        sourceVersionId: { type: integer, format: int64 }
        targetNamespaceId: { type: integer, format: int64 }
        submittedBy: { type: string }
        status: { type: string }
        submittedAt: { type: string }

    PromotionQueueActions:
      type: object
      properties:
        canReview: { type: boolean }
        canSubmit: { type: boolean }
        canWithdraw: { type: boolean }

    PromotionDetailReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            request:
              $ref: "#/components/schemas/PromotionRequestView"
            sourceSkillName: { type: string }
            availableActions:
              $ref: "#/components/schemas/PromotionDetailActions"

    PromotionDetailActions:
      type: object
      properties:
        canApprove: { type: boolean }
        canReject: { type: boolean }
        canWithdraw: { type: boolean }

    GovernanceWorkbenchReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            summary:
              $ref: "#/components/schemas/GovernanceSummaryView"
            recentActivity:
              type: array
              items:
                $ref: "#/components/schemas/GovernanceActivityView"
            availableActions:
              $ref: "#/components/schemas/GovernanceWorkbenchActions"

    GovernanceSummaryView:
      type: object
      properties:
        total: { type: integer, format: int64 }
        unread: { type: integer, format: int64 }
        byCategory:
          type: object
          additionalProperties: { type: integer, format: int64 }
        pendingReviews: { type: integer, format: int64 }
        pendingPromotions: { type: integer, format: int64 }

    GovernanceActivityView:
      type: object
      properties:
        id: { type: integer, format: int64 }
        category: { type: string }
        title: { type: string }
        createdAt: { type: string }
        isRead: { type: boolean }

    GovernanceWorkbenchActions:
      type: object
      properties:
        canReview: { type: boolean }
        canAccessAdmin: { type: boolean }
        canViewAuditLog: { type: boolean }

    AdminPageReadModel:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            stats:
              $ref: "#/components/schemas/AdminStatsView"
            availableActions:
              $ref: "#/components/schemas/AdminPageActions"

    AdminStatsView:
      type: object
      properties:
        totalSkills: { type: integer, format: int64 }
        totalNamespaces: { type: integer, format: int64 }
        totalUsers: { type: integer, format: int64 }
        pendingReviews: { type: integer, format: int64 }
        pendingPromotions: { type: integer, format: int64 }
        openReports: { type: integer, format: int64 }

    AdminPageActions:
      type: object
      properties:
        canManageSkills: { type: boolean }
        canManageUsers: { type: boolean }
        canManageLabels: { type: boolean }
        canResolveReports: { type: boolean }
        canRebuildSearch: { type: boolean }
        canViewAuditLog: { type: boolean }
        canManageNamespaces: { type: boolean }

    # ── Shared types ──────────────────────────────────────────────────

    SearchResult:
      type: object
      properties:
        skillIds:
          type: array
          items: { type: integer, format: int64 }
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }

    SkillDetail:
      type: object
      properties:
        id: { type: integer, format: int64 }
        slug: { type: string }
        displayName: { type: string }
        ownerId: { type: string }
        summary: { type: string }
        visibility: { type: string }
        status: { type: string }
        downloadCount: { type: integer }
        starCount: { type: integer }
        ratingAvg: { type: number }
        canManage: { type: boolean }

    VersionDetail:
      type: object
      properties:
        id: { type: integer, format: int64 }
        version: { type: string }
        status: { type: string }

    SkillFile:
      type: object
      properties:
        path: { type: string }
        size: { type: integer, format: int64 }

    Namespace:
      type: object
      properties:
        id: { type: integer, format: int64 }
        slug: { type: string }
        displayName: { type: string }
        type: { type: string }
        description: { type: string }

    NamespaceMember:
      type: object
      properties:
        namespaceId: { type: integer, format: int64 }
        userId: { type: string }
        role: { type: string }

    # ── Tool API schemas ────────────────────────────────────────────────

    WorkspaceMetadataResponse:
      type: object
      properties:
        workspace:
          type: object
          properties:
            requiredFiles:
              type: array
              items: { type: string }
            optionalFiles:
              type: array
              items: { type: string }
            manifestFormat: { type: string }
            schema:
              type: object
              properties:
                fields:
                  type: array
                  items: { type: string }
                required:
                  type: array
                  items: { type: string }

    PackageHashRequest:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PackageEntry"

    PackageHashResponse:
      type: object
      properties:
        manifest:
          $ref: "#/components/schemas/PackageManifest"

    PackageManifest:
      type: object
      properties:
        hash: { type: string }
        totalSize: { type: integer, format: int64 }
        fileCount: { type: integer }
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ManifestEntry"

    ManifestEntry:
      type: object
      properties:
        path: { type: string }
        size: { type: integer, format: int64 }
        contentType: { type: string }
        sha256: { type: string }

    PackageEntry:
      type: object
      properties:
        path: { type: string }
        content: { type: string }
        size: { type: integer, format: int64 }
        contentType: { type: string }

    ResolveResult:
      type: object
      properties:
        skillId: { type: integer, format: int64 }
        namespace: { type: string }
        slug: { type: string }
        version: { type: string }
        versionId: { type: integer, format: int64 }
        fingerprint: { type: string }
        downloadUrl: { type: string }

    InstallTarget:
      type: object
      properties:
        skillId: { type: integer, format: int64 }
        skillSlug: { type: string }
        namespace: { type: string }
        version: { type: string }
        fingerprint: { type: string }
        downloadUrl: { type: string }
        supportedAgents:
          type: array
          items:
            $ref: "#/components/schemas/AgentRuntime"
        installPath: { type: string }

    AgentRuntime:
      type: object
      properties:
        type: { type: string }
        minVersion: { type: string }

    VersionDiff:
      type: object
      properties:
        fromVersion: { type: string }
        toVersion: { type: string }
        summary:
          $ref: "#/components/schemas/DiffSummary"
        files:
          type: array
          items:
            $ref: "#/components/schemas/DiffFile"

    DiffSummary:
      type: object
      properties:
        totalFiles: { type: integer }
        addedFiles: { type: integer }
        modifiedFiles: { type: integer }
        removedFiles: { type: integer }
        addedLines: { type: integer }
        removedLines: { type: integer }

    DiffFile:
      type: object
      properties:
        path: { type: string }
        changeType:
          type: string
          enum: [ADDED, REMOVED, MODIFIED]
        oldSize: { type: integer, format: int64 }
        newSize: { type: integer, format: int64 }
        binary: { type: boolean }
        truncated: { type: boolean }
        hunks:
          type: array
          items:
            $ref: "#/components/schemas/DiffHunk"

    DiffHunk:
      type: object
      properties:
        oldStart: { type: integer }
        oldLines: { type: integer }
        newStart: { type: integer }
        newLines: { type: integer }
        lines:
          type: array
          items:
            $ref: "#/components/schemas/DiffLine"

    DiffLine:
      type: object
      properties:
        type:
          type: string
          enum: [ADD, DELETE, CONTEXT]
        content: { type: string }
        oldLineNumber: { type: integer }
        newLineNumber: { type: integer }

    ToolValidateResponse:
      type: object
      properties:
        valid: { type: boolean }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        resolvedSlug: { type: string }
        resolvedVersion: { type: string }

    ToolPublishResponse:
      type: object
      properties:
        skillId: { type: integer, format: int64 }
        slug: { type: string }
        version:
          $ref: "#/components/schemas/VersionDetail"

    EvaluateRequest:
      type: object
      properties:
        skillId: { type: integer, format: int64 }
        versionId: { type: integer, format: int64 }
        trigger: { type: string }

    EvaluateResponse:
      type: object
      properties:
        accepted: { type: boolean }
        checkRunId: { type: string }
        message: { type: string }

    ProposalRequest:
      type: object
      properties:
        skillId: { type: integer, format: int64 }
        namespace: { type: string }
        slug: { type: string }
        title: { type: string }
        description: { type: string }
        diffSummary:
          $ref: "#/components/schemas/VersionDiff"

    ProposalResponse:
      type: object
      properties:
        accepted: { type: boolean }
        proposalId: { type: string }
        message: { type: string }

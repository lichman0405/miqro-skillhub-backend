# SkillHub — release Compose stack.
# Mirrors source compose.release.yml structure.
#
# Usage: docker compose -f compose.release.yml up -d

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillhub-postgres
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
      POSTGRES_DB: skillhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: skillhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillhub-server
    environment:
      SKILLHUB_API_ADDR: ":8080"
      SKILLHUB_DATABASE_URL: "postgres://skillhub:skillhub@postgres:5432/skillhub?sslmode=disable"
      SKILLHUB_REDIS_URL: "redis://redis:6379/0"
      SKILLHUB_STORAGE_ENDPOINT: "minio:9000"
      SKILLHUB_STORAGE_BUCKET: "skillhub"
      SKILLHUB_STORAGE_ACCESS_KEY: "minioadmin"
      SKILLHUB_STORAGE_SECRET_KEY: "minioadmin"
      SKILLHUB_LOCAL_MODE: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default

volumes:
  pgdata:
  miniodata:

networks:
  default:
    driver: bridge

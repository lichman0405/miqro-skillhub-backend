# SkillHub — release Compose stack.
# Mirrors source compose.release.yml structure.
#
# This file is a release-style compose example.
#
# BEFORE using this file, set the required environment variables:
#   SKILLHUB_DATABASE_URL       PostgreSQL connection string (production)
#   SKILLHUB_STORAGE_ACCESS_KEY S3/MinIO access key (not minioadmin)
#   SKILLHUB_STORAGE_SECRET_KEY S3/MinIO secret key (not minioadmin)
#
# The compose will refuse to start if any of these are missing.
#
# Credential consistency: MinIO and the server share the SAME
# SKILLHUB_STORAGE_ACCESS_KEY / SKILLHUB_STORAGE_SECRET_KEY. Both
# MINIO_ROOT_USER/MINIO_ROOT_PASSWORD and the server's storage credentials
# are derived from the same environment variables so MinIO authentication
# and the server's S3 client always agree. These values must not be
# minioadmin/minioadmin (production mode rejects them).
#
# Storage: uses S3/MinIO. The MinIO bucket ("skillhub") must be created before
# starting the server. See the MinIO service below for console access.
#
# Sessions and rate limiting: the server uses in-process implementations.
# Redis is started as reserved infrastructure for future adapters; the server
# does NOT currently consume Redis for sessions or distributed rate limiting.
#
# Usage: SKILLHUB_DATABASE_URL="..." SKILLHUB_STORAGE_ACCESS_KEY="..." SKILLHUB_STORAGE_SECRET_KEY="..." docker compose -f compose.release.yml up -d

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillhub-postgres
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
      POSTGRES_DB: skillhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis is reserved for future adapters (distributed sessions, rate limiting).
  # The server does NOT currently use Redis at runtime.
  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: skillhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${SKILLHUB_STORAGE_ACCESS_KEY:?set SKILLHUB_STORAGE_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${SKILLHUB_STORAGE_SECRET_KEY:?set SKILLHUB_STORAGE_SECRET_KEY}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillhub-server
    environment:
      SKILLHUB_API_ADDR: ":8080"
      SKILLHUB_DATABASE_URL: "${SKILLHUB_DATABASE_URL:?set SKILLHUB_DATABASE_URL}"
      SKILLHUB_REDIS_URL: "redis://redis:6379/0"
      SKILLHUB_STORAGE_PROVIDER: "s3"
      SKILLHUB_STORAGE_ENDPOINT: "minio:9000"
      SKILLHUB_STORAGE_BUCKET: "skillhub"
      SKILLHUB_STORAGE_ACCESS_KEY: "${SKILLHUB_STORAGE_ACCESS_KEY:?set SKILLHUB_STORAGE_ACCESS_KEY}"
      SKILLHUB_STORAGE_SECRET_KEY: "${SKILLHUB_STORAGE_SECRET_KEY:?set SKILLHUB_STORAGE_SECRET_KEY}"
      SKILLHUB_STORAGE_USE_SSL: "false"
      SKILLHUB_LOCAL_MODE: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default

volumes:
  pgdata:
  miniodata:

networks:
  default:
    driver: bridge

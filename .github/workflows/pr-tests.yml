name: PR Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skillhub
          POSTGRES_PASSWORD: skillhub
          POSTGRES_DB: skillhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...
        env:
          SKILLHUB_DATABASE_URL: "postgres://skillhub:skillhub@localhost:5432/skillhub?sslmode=disable"
          SKILLHUB_LOCAL_MODE: "true"
      - name: Build
        run: go build ./cmd/skillhub-server && go build ./cmd/skillhub-migrate && go build ./cmd/skillhub-worker

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f server/Dockerfile server
